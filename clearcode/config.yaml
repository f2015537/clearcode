embeddings:
  provider: openai
  model: text-embedding-3-small
  dims: 1536

rag:
  mode: semantic # semantic | hybrid

vector_store:
  provider: chromadb
  retrieval_mode: hybrid # dense | sparse | hybrid

qdrant:
  collection_name: codebase

chromadb:
  persist_dir: .clearcode/chromadb/
  collection_name: codebase

elasticsearch:
  url: http://localhost:9200
  index_name: codebase

llm:
  provider: openai # openai | anthropic
  model: gpt-5.5
  judge_model: gpt-4o-mini # cheaper model used only for LLM-as-judge

memory:
  db_path: .clearcode/memory/memory.db
  summarize_at_tokens: 4000
  keep_last_messages: 20

skills:
  skills_dir: .clearcode/skills

tasks:
  db_path: .clearcode/tasks/tasks.db

semantic_cache:
  enabled: true
  redis_url: redis://localhost:6379
  threshold: 0.85
  ttl: 86400 # 24 hours
